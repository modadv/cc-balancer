server:
  host: 0.0.0.0
  port: 8000

gateway:
  authToken: ${CC_BALANCER_AUTH_TOKEN}

log:
  level: info

routing:
  strategy: least-fail

concurrency:
  acquireTimeoutMs: 30000
  maxPendingRequests: 1024

requestTimeout:
  # Max wait for upstream response headers. Default 600000 (10 min) tolerates
  # long-tail TTFT for non-streaming / thinking-heavy requests. 0 disables it,
  # but is NOT recommended: a stuck connection will permanently consume an
  # inFlight slot and can deadlock an upstream.
  headersMs: 600000
  # Max gap between body bytes (idle timeout for the response stream).
  # Default 120000 (2 min) is safely above Anthropic SSE keepalive cadence
  # (typically <60s) and below most middlebox idle-kill thresholds (5-10 min).
  # Setting to 0 disables it, which can cause inFlight leaks if intermediaries
  # silently drop the connection without sending FIN/RST.
  bodyMs: 120000

upstreams:
  - id: official-1
    baseUrl: https://api.anthropic.com
    apiKey: ${ANTHROPIC_KEY_1}
    weight: 2
    maxConcurrentRequests: 4

  - id: official-2
    baseUrl: https://api.anthropic.com
    apiKey: ${ANTHROPIC_KEY_2}
    weight: 1

retry:
  maxAttempts: 4
  perUpstreamRetries: 2
  backoff:
    type: exponential
    baseDelayMs: 200
    maxDelayMs: 2000

cooldown:
  rateLimit: 60
  quotaExceeded: 300
  serverError: 10
  networkError: 15

health:
  enable: true
  path: /health

metrics:
  enable: true
  path: /metrics

status:
  enable: true
  path: /upstreams
